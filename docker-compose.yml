version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: ibot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ibot_db
      MYSQL_USER: ibot_user
      MYSQL_PASSWORD: ibot_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ibot-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ibot_db
      DB_USERNAME: ibot_user
      DB_PASSWORD: ibot_pass
      JWT_SECRET: ibot-production-jwt-secret-key-must-be-32-chars-minimum-change-this
      JWT_EXPIRATION: 86400000
      UPLOAD_DIR: /app/uploads
      TESSDATA_PATH: /usr/share/tessdata
    volumes:
      - invoice_uploads:/app/uploads
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ibot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://backend:8080/api

volumes:
  mysql_data:
  invoice_uploads:
