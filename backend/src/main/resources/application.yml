server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: ibot-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ibot_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:ibot-super-secret-jwt-key-change-this-in-production-min-256-bits-long}
  expiration: ${JWT_EXPIRATION:86400000}   # 24 hours in ms
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days in ms

# File upload paths
file:
  upload-dir: ${UPLOAD_DIR:./uploads}

# OCR Configuration
ocr:
  tessdata-path: ${TESSDATA_PATH:/usr/share/tessdata}
  language: eng+hin

# Logging
logging:
  level:
    com.ibot: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
